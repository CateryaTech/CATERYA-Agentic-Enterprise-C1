global:
  resolve_timeout: 5m
  smtp_from: 'alerts@caterya.tech'
  smtp_smarthost: '${SMTP_HOST}:587'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'

route:
  group_by: ['alertname', 'tenant_id']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      repeat_interval: 1h
    - match:
        team: safety
      receiver: 'safety-team'

receivers:
  - name: 'default'
    email_configs:
      - to: 'cateryatech@proton.me'
        subject: '[CATERYA] {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          {{ end }}

  - name: 'critical-alerts'
    email_configs:
      - to: 'cateryatech@proton.me'
        subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    # Uncomment for Slack:
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#caterya-alerts'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'safety-team'
    email_configs:
      - to: 'cateryatech@proton.me'
        subject: '[SAFETY] Guardrail Alert: {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
