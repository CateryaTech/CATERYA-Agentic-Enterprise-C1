global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'caterya-enterprise'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── CATERYA App ────────────────────────────────────────────────────────────
  - job_name: 'caterya-app'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ── FastAPI ────────────────────────────────────────────────────────────────
  - job_name: 'caterya-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ── Redis ──────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── Kubernetes node metrics (if on K8s) ───────────────────────────────────
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
    tls_config:
      insecure_skip_verify: true
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
